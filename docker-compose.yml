# ============================================================================
# StudyLeia — docker-compose
#
# Uso: basta rodar `docker compose up --build` na raiz do projeto.
# Nenhuma configuração manual é necessária — o MySQL já nasce com o banco
# `memora_db` criado, e a aplicação já aponta para o serviço `mysql` (não
# `localhost`) via a variável SPRING_DATASOURCE_URL abaixo, que tem
# precedência sobre o valor padrão do application.yml.
#
# Serviços e portas depois do `up`:
#   - Frontend (React):    http://localhost:5173
#   - Backend (API):       http://localhost:8080
#   - phpMyAdmin (banco):  http://localhost:8082  (servidor "mysql", usuário
#                          "root", senha = MYSQL_ROOT_PASSWORD abaixo)
#   - MySQL (cliente externo, ex. DBeaver/TablePlus): localhost:3307
#
# Para usar uma chave de IA real (Gemini/Groq/OpenRouter) em vez do
# provider MOCK, defina as variáveis de ambiente correspondentes antes
# de subir o compose, ex.:
#   MEMORA_IA_PROVIDER=GEMINI GEMINI_API_KEY=sua-chave docker compose up
# ============================================================================

services:

  mysql:
    image: mysql:8.0
    container_name: studyleia-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-memora_root_pw}
      MYSQL_DATABASE: memora_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - studyleia-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-memora_root_pw}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - studyleia-network

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyleia-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Sobrescreve a URL do datasource do application.yml — usa o
      # nome do serviço Docker ("mysql") em vez de "localhost", já que
      # dentro da rede do compose os containers se enxergam pelo nome
      # do serviço.
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/memora_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-memora_root_pw}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JWT_SECRET: ${JWT_SECRET:-memora-leia-edition-chave-secreta-trocar-em-producao-32bytes+}
      MEMORA_IA_PROVIDER: ${MEMORA_IA_PROVIDER:-MOCK}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    networks:
      - studyleia-network

  # ------------------------------------------------------------------------
  # Frontend — única interface oficial do StudyLeia (SPA React servida por
  # Nginx). O front-end legado em Thymeleaf (backend/src/main/resources)
  # foi removido; este é agora o único serviço que serve HTML.
  # ------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: studyleia-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "5173:80"
    networks:
      - studyleia-network

  # ------------------------------------------------------------------------
  # phpMyAdmin — interface web pra inspecionar/editar o banco `memora_db`
  # direto pelo navegador, sem precisar de cliente MySQL instalado.
  # Acesse em http://localhost:8082 depois do `docker compose up` (login:
  # servidor "mysql" já vem pré-selecionado, usuário "root", senha igual
  # à MYSQL_ROOT_PASSWORD — "memora_root_pw" por padrão).
  # ------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: studyleia-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-memora_root_pw}
      UPLOAD_LIMIT: 64M
    ports:
      - "8082:80"
    networks:
      - studyleia-network

networks:
  studyleia-network:
    driver: bridge

volumes:
  studyleia-mysql-data:
