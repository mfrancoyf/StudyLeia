services:

  mysql:
    image: mysql:8.0
    container_name: memora-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: memora_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci

    ports:
      - "3306:3306"

    volumes:
      - memora-mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - memora-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: memora-phpmyadmin
    restart: unless-stopped

    depends_on:
      - mysql

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    ports:
      - "8081:80"

    networks:
      - memora-network

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: memora-app
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/memora_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      SPRING_PROFILES_ACTIVE: prod

      JWT_SECRET: ${JWT_SECRET}

      MEMORA_IA_PROVIDER: ${MEMORA_IA_PROVIDER}

      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}

      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      APP_BASE_URL: ${APP_BASE_URL}

    ports:
      - "8080:8080"

    networks:
      - memora-network

networks:
  memora-network:
    driver: bridge

volumes:
  memora-mysql-data: