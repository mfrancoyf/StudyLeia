<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Entrar · Memora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/memora.css}"/>
    <link rel="stylesheet" th:href="@{/css/leia.css}"/>
</head>
<body>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="max-width: 920px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-soft);">

        <!-- Lado da Leia -->
        <div class="card-memora--azul" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 32px; border-radius: 0;">
            <div th:replace="~{fragments/leia :: mascote(humor='SUPER_FELIZ', estagio='ADULTA', tamanho='200px')}"></div>
            <h2 style="margin-top: 18px; color: white;">Bem-vinda de volta!</h2>
            <p style="color: rgba(255,255,255,0.85); text-align: center; max-width: 280px;">
                A Leia está te esperando para continuar os estudos de hoje. 🐾
            </p>
        </div>

        <!-- Formulário -->
        <div style="background: var(--memora-white); padding: 48px 40px; display: flex; flex-direction: column; justify-content: center;">
            <h1 style="margin-bottom: 4px;">Entrar</h1>
            <p class="texto-suave" style="margin-bottom: 28px;">Continue cuidando da sua jornada de estudos.</p>

            <div id="erroLogin" class="memora-toast memora-toast--erro" style="display: none; margin-bottom: 16px;"></div>

            <form id="formLogin">
                <div class="campo-memora">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="voce@email.com"/>
                </div>
                <div class="campo-memora">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required autocomplete="current-password" placeholder="••••••••"/>
                </div>

                <button type="submit" class="btn-memora btn-memora--primario" style="width: 100%; justify-content: center; margin-top: 8px;">
                    Entrar
                </button>
            </form>

            <div style="margin-top: 18px; display: flex; justify-content: space-between; font-size: 0.9rem;">
                <a th:href="@{/esqueci-senha}">Esqueci minha senha</a>
                <a th:href="@{/registro}">Criar conta</a>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/memora.js}"></script>
<script th:inline="javascript">
    document.getElementById('formLogin').addEventListener('submit', async (evento) => {
        evento.preventDefault();
        const erroBox = document.getElementById('erroLogin');
        erroBox.style.display = 'none';

        const dados = {
            email: document.getElementById('email').value.trim(),
            senha: document.getElementById('senha').value,
        };

        try {
            await Memora.chamarApi('/api/auth/login', { method: 'POST', body: JSON.stringify(dados) });
            window.location.href = '/dashboard';
        } catch (erro) {
            erroBox.textContent = erro.message;
            erroBox.style.display = 'flex';
        }
    });
</script>

</body>
</html>
