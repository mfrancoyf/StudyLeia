server:
  port: 8080

spring:
  application:
    name: memora

  profiles:
    active: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/memora_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false
    encoding: UTF-8

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

memora:
  jwt:
    secret: ${JWT_SECRET:memora-leia-edition-chave-secreta-trocar-em-producao-32bytes+}
    expiracao-minutos: 120

  app:
    url-base: ${APP_BASE_URL:http://localhost:8080}

  ia:
    provider: ${MEMORA_IA_PROVIDER:MOCK}

    gemini:
      api-key: ${GEMINI_API_KEY:}
      modelo: ${GEMINI_MODEL:gemini-2.5-flash}
      url-base: https://generativelanguage.googleapis.com/v1beta/models

    groq:
      api-key: ${GROQ_API_KEY:}
      modelo: ${GROQ_MODEL:llama-3.1-8b-instant}
      url-base: https://api.groq.com/openai/v1

    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      modelo: ${OPENROUTER_MODEL:meta-llama/llama-3.1-8b-instruct:free}
      url-base: https://openrouter.ai/api/v1

logging:
  level:
    com.memora: INFO
    org.hibernate.SQL: WARN

  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"