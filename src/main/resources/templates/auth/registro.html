<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Criar conta · Memora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/memora.css}"/>
    <link rel="stylesheet" th:href="@{/css/leia.css}"/>
</head>
<body>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="max-width: 920px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-soft);">

        <div style="background: var(--memora-white); padding: 48px 40px; display: flex; flex-direction: column; justify-content: center;">
            <h1 style="margin-bottom: 4px;">Criar conta</h1>
            <p class="texto-suave" style="margin-bottom: 24px;">Comece a estudar com a sua companheira de jornada.</p>

            <div id="erroRegistro" class="memora-toast memora-toast--erro" style="display: none; margin-bottom: 16px;"></div>

            <form id="formRegistro">
                <div class="campo-memora">
                    <label for="nome">Seu nome</label>
                    <input type="text" id="nome" name="nome" required placeholder="Como a Leia vai te chamar?"/>
                </div>
                <div class="campo-memora">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="voce@email.com"/>
                </div>
                <div class="campo-memora">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres"/>
                </div>
                <div class="campo-memora">
                    <label for="nomeDaPet">Nome da sua gatinha (opcional)</label>
                    <input type="text" id="nomeDaPet" name="nomeDaPet" placeholder="Leia"/>
                </div>

                <button type="submit" class="btn-memora btn-memora--primario" style="width: 100%; justify-content: center; margin-top: 8px;">
                    Criar minha conta
                </button>
            </form>

            <p style="margin-top: 18px; font-size: 0.9rem;">
                Já tem conta? <a th:href="@{/login}">Entrar</a>
            </p>
        </div>

        <div class="card-memora--azul" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 32px; border-radius: 0;">
            <div th:replace="~{fragments/leia :: mascote(humor='FELIZ', estagio='FILHOTE', tamanho='180px')}"></div>
            <h2 style="margin-top: 18px; color: white;">Toda jornada começa pequenininha</h2>
            <p style="color: rgba(255,255,255,0.85); text-align: center; max-width: 280px;">
                Sua gatinha vai crescer e evoluir conforme você estuda. Vamos começar juntas?
            </p>
        </div>
    </div>
</div>

<script th:src="@{/js/memora.js}"></script>
<script th:inline="javascript">
    document.getElementById('formRegistro').addEventListener('submit', async (evento) => {
        evento.preventDefault();
        const erroBox = document.getElementById('erroRegistro');
        erroBox.style.display = 'none';

        const dados = {
            nome: document.getElementById('nome').value.trim(),
            email: document.getElementById('email').value.trim(),
            senha: document.getElementById('senha').value,
            nomeDaPet: document.getElementById('nomeDaPet').value.trim() || 'Leia',
        };

        try {
            await Memora.chamarApi('/api/auth/registro', { method: 'POST', body: JSON.stringify(dados) });
            window.location.href = '/dashboard';
        } catch (erro) {
            const mensagens = erro.camposInvalidos ? Object.values(erro.camposInvalidos).join(' · ') : erro.message;
            erroBox.textContent = mensagens;
            erroBox.style.display = 'flex';
        }
    });
</script>

</body>
</html>
