<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Detalhe do Plano')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('study-plans')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('study-plans')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 id="materiaTexto" style="margin-bottom: 2px;">Plano de estudos</h1>
                <p class="texto-suave" id="dataProvaTexto" style="margin: 0;"></p>
            </div>
            <a th:href="@{/study-plans}" class="btn-memora btn-memora--fantasma">← Voltar</a>
        </div>

        <div class="card-memora" style="display:flex; align-items:center; gap: 16px; margin-bottom: 18px;">
            <div th:replace="~{fragments/leia :: mascote(humor='NEUTRA', estagio='ADULTA', tamanho='70px')}"></div>
            <p class="texto-suave" style="margin: 0; font-size: 0.86rem;" id="leiaIncentivoTexto">Vamos juntas até a prova!</p>
        </div>

        <div class="card-memora" style="margin-bottom: 18px;">
            <p id="resumoTexto" class="texto-suave" style="margin-bottom: 10px;"></p>
            <div class="xp-barra">
                <div class="xp-barra__preenchimento" id="barraProgressoPlano" style="width: 0%;"></div>
            </div>
            <p class="texto-suave" id="percentualTexto" style="font-size: 0.82rem; margin-top: 6px;"></p>
        </div>

        <div id="itensContainer"></div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('study-plans')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    const planId = window.location.pathname.split('/').filter(Boolean).pop();

    const ICONES_TIPO_ITEM = { ESTUDO: '📖', REVISAO: '🔁', SIMULADO: '🧪' };

    function agruparPorData(itens) {
        const grupos = {};
        itens.forEach(item => {
            if (!grupos[item.data]) grupos[item.data] = [];
            grupos[item.data].push(item);
        });
        return grupos;
    }

    function renderizarPlano(plano) {
        document.getElementById('materiaTexto').textContent = plano.materia;
        document.getElementById('dataProvaTexto').textContent = `Prova em ${new Date(plano.dataProva).toLocaleDateString('pt-BR')}`;
        document.getElementById('resumoTexto').textContent = plano.resumo;
        document.getElementById('barraProgressoPlano').style.width = plano.percentualConcluido + '%';
        document.getElementById('percentualTexto').textContent = `${Math.round(plano.percentualConcluido)}% concluído`;

        const grupos = agruparPorData(plano.itens);
        const container = document.getElementById('itensContainer');

        container.innerHTML = Object.entries(grupos).map(([data, itens]) => `
            <div class="card-memora" style="margin-bottom: 12px;">
                <strong style="display:block; margin-bottom: 10px;">${new Date(data).toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit' })}</strong>
                ${itens.map(item => `
                    <div style="display:flex; align-items:start; gap: 10px; padding: 8px 0; border-top: 1px solid var(--memora-line);">
                        <input type="checkbox" ${item.concluido ? 'checked disabled' : ''} onchange="concluirItem('${item.id}')" style="margin-top: 4px; width: 20px; height: 20px;"/>
                        <div>
                            <div style="font-weight: 700; font-size: 0.9rem;">${ICONES_TIPO_ITEM[item.tipo] || ''} ${item.assunto}</div>
                            <p class="texto-suave" style="font-size: 0.82rem; margin: 2px 0 0;">${item.descricao || ''}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    async function carregarPlano() {
        try {
            const plano = await Memora.chamarApi(`/api/study-plans/${planId}`);
            renderizarPlano(plano);
        } catch (erro) {
            document.getElementById('itensContainer').innerHTML = '<p class="texto-suave">Não foi possível carregar este plano.</p>';
        }
    }

    async function concluirItem(itemId) {
        try {
            const plano = await Memora.chamarApi(`/api/study-plans/${planId}/itens/${itemId}/concluir`, { method: 'PATCH' });
            renderizarPlano(plano);
            if (plano.concluido) {
                Memora.dispararConfete();
                Memora.reagirLeia('surpresa');
                document.getElementById('leiaIncentivoTexto').textContent = 'Você concluiu o plano! Estou muito orgulhosa! 🎉';
                Memora.exibirToast({ titulo: '🎉 Plano de estudos concluído! +20 XP' });
            } else {
                Memora.reagirLeia('ganhou-xp');
                document.getElementById('leiaIncentivoTexto').textContent = 'Mais um passo! Continue assim!';
                Memora.exibirToast({ titulo: '✅ Item concluído!' });
            }
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível concluir este item.', tipo: 'erro' });
        }
    }

    carregarPlano();
</script>

</body>
</html>
