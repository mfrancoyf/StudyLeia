<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Montar Plano de Estudos')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('study-plans')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('study-plans')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Montar Plano de Estudos</h1>
                <p class="texto-suave" style="margin: 0;">A IA monta um cronograma completo para você.</p>
            </div>
        </div>

        <div class="card-memora" style="max-width: 520px;" id="formularioContainer">
            <div class="campo-memora">
                <label for="materia">Matéria</label>
                <input type="text" id="materia" placeholder="Ex: Anatomia Humana"/>
            </div>
            <div class="campo-memora">
                <label for="dataProva">Data da prova</label>
                <input type="date" id="dataProva"/>
            </div>
            <div class="campo-memora">
                <label for="horasDisponiveis">Horas disponíveis por dia</label>
                <input type="number" id="horasDisponiveis" min="0.5" step="0.5" value="2"/>
            </div>

            <button class="btn-memora btn-memora--dourado" style="width: 100%;" onclick="gerarPlano()">✨ Gerar cronograma com IA</button>
            <div id="erroPlano" class="memora-toast memora-toast--erro" style="display: none; margin-top: 14px;"></div>
        </div>

        <div class="card-memora" id="carregandoContainer" style="display: none; max-width: 520px; text-align: center;">
            <div th:replace="~{fragments/leia :: mascote(humor='NEUTRA', estagio='ADULTA', tamanho='140px')}" style="margin: 0 auto 10px;"></div>
            <p class="texto-suave">A Leia está montando seu cronograma... isso pode levar alguns segundos.</p>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('study-plans')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    document.getElementById('dataProva').min = new Date().toISOString().split('T')[0];

    async function gerarPlano() {
        const erroBox = document.getElementById('erroPlano');
        erroBox.style.display = 'none';

        const dados = {
            materia: document.getElementById('materia').value.trim(),
            dataProva: document.getElementById('dataProva').value,
            horasDisponiveisPorDia: parseFloat(document.getElementById('horasDisponiveis').value),
        };

        if (!dados.materia || !dados.dataProva) {
            erroBox.textContent = 'Preencha a matéria e a data da prova.';
            erroBox.style.display = 'flex';
            return;
        }

        document.getElementById('formularioContainer').style.display = 'none';
        document.getElementById('carregandoContainer').style.display = 'block';

        try {
            const plano = await Memora.chamarApi('/api/study-plans/gerar-com-ia', { method: 'POST', body: JSON.stringify(dados) });
            window.location.href = `/study-plans/${plano.id}`;
        } catch (erro) {
            document.getElementById('formularioContainer').style.display = 'block';
            document.getElementById('carregandoContainer').style.display = 'none';
            erroBox.textContent = erro.message;
            erroBox.style.display = 'flex';
        }
    }
</script>

</body>
</html>
