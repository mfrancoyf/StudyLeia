# StudyLeia — Nginx serve a SPA React.
# `try_files ... /index.html` é o que permite rotas do react-router
# (ex.: /leia, /loja, /jardim) funcionarem em reload/acesso direto —
# sem isso, o Nginx devolveria 404 pra qualquer rota que não seja um
# arquivo físico em /dist.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
