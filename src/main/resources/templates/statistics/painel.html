<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Estatísticas')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('statistics')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('statistics')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Estatísticas</h1>
                <p class="texto-suave" style="margin: 0;">Acompanhe sua evolução nos estudos.</p>
            </div>
        </div>

        <!-- Stats principais -->
        <div class="grid-memora grid-memora--4" style="margin-bottom: 20px;">
            <div class="stat-card"><span class="stat-card__valor" id="statHoras">0</span><span class="stat-card__label">Horas estudadas</span></div>
            <div class="stat-card"><span class="stat-card__valor" id="statXp">0</span><span class="stat-card__label">XP acumulado</span></div>
            <div class="stat-card"><span class="stat-card__valor" id="statTaxa">0%</span><span class="stat-card__label">Taxa de acerto</span></div>
            <div class="stat-card"><span class="stat-card__valor" id="statDiasAtivos">0</span><span class="stat-card__label">Dias ativos</span></div>
        </div>

        <div class="grid-memora grid-memora--2" style="margin-bottom: 20px;">
            <div class="stat-card"><span class="stat-card__valor" id="statStreakAtual">0</span><span class="stat-card__label">Sequência atual</span></div>
            <div class="stat-card"><span class="stat-card__valor" id="statStreakMaior">0</span><span class="stat-card__label">Melhor sequência</span></div>
        </div>

        <!-- Gráfico de evolução de XP -->
        <div class="card-memora" style="margin-bottom: 18px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">📈 Evolução de XP</h3>
                <div class="tabs-memora" style="margin: 0;">
                    <button class="tab-memora active" data-periodo-xp="semanal">Semanal</button>
                    <button class="tab-memora" data-periodo-xp="mensal">Mensal</button>
                </div>
            </div>
            <div style="position: relative; height: 240px;">
                <canvas id="graficoXp"></canvas>
            </div>
        </div>

        <!-- Gráfico de atividade -->
        <div class="card-memora" style="margin-bottom: 18px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">📊 Atividade de estudo</h3>
                <div class="tabs-memora" style="margin: 0;">
                    <button class="tab-memora active" data-periodo-atividade="semanal">Semanal</button>
                    <button class="tab-memora" data-periodo-atividade="mensal">Mensal</button>
                </div>
            </div>
            <div style="position: relative; height: 220px;">
                <canvas id="graficoAtividade"></canvas>
            </div>
        </div>

        <div class="grid-memora" style="grid-template-columns: 1fr; gap: 18px;">
            <!-- Acertos por matéria -->
            <div class="card-memora">
                <h3 style="margin-bottom: 14px;">🎯 Acertos por matéria</h3>
                <div id="acertosPorMateriaLista"></div>
            </div>

            <div class="grid-memora grid-memora--2">
                <div class="card-memora">
                    <h3 style="margin-bottom: 10px;">🔥 Mais estudadas</h3>
                    <div id="maisEstudadasLista"></div>
                </div>
                <div class="card-memora">
                    <h3 style="margin-bottom: 10px;">🧊 Menos estudadas</h3>
                    <div id="menosEstudadasLista"></div>
                </div>
            </div>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('statistics')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<script th:inline="javascript">
    let estatisticas = null;
    let graficoXp = null;
    let graficoAtividade = null;

    const CORES = {
        azul: '#4C6FE5',
        azulClaro: 'rgba(76,111,229,0.14)',
        dourado: '#FFC94D',
        mint: '#5FCBA0',
    };

    function montarGraficoLinha(canvasId, dados, instanciaAnterior) {
        if (instanciaAnterior) instanciaAnterior.destroy();
        const ctx = document.getElementById(canvasId).getContext('2d');
        return new Chart(ctx, {
            type: 'line',
            data: {
                labels: dados.map(d => d.rotulo),
                datasets: [{
                    label: 'XP',
                    data: dados.map(d => d.valor),
                    borderColor: CORES.azul,
                    backgroundColor: CORES.azulClaro,
                    fill: true,
                    tension: 0.35,
                    pointRadius: 3,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } },
            },
        });
    }

    function montarGraficoBarras(canvasId, dados, instanciaAnterior) {
        if (instanciaAnterior) instanciaAnterior.destroy();
        const ctx = document.getElementById(canvasId).getContext('2d');
        return new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dados.map(d => d.rotulo),
                datasets: [{
                    label: 'Atividade',
                    data: dados.map(d => d.valor),
                    backgroundColor: CORES.dourado,
                    borderRadius: 6,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
            },
        });
    }

    function renderizarListaTemas(containerId, lista) {
        const container = document.getElementById(containerId);
        if (!lista.length) {
            container.innerHTML = '<p class="texto-suave">Sem dados suficientes ainda.</p>';
            return;
        }
        container.innerHTML = lista.map(item => `
            <div style="margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between; font-size: 0.88rem; font-weight: 700;">
                    <span>${item.tema}</span>
                    <span class="texto-suave">${item.totalRespondidas} questões</span>
                </div>
                <div class="xp-barra" style="height: 8px; margin-top: 4px;">
                    <div class="xp-barra__preenchimento" style="width: ${item.taxaAcerto}%;"></div>
                </div>
            </div>
        `).join('');
    }

    async function carregarEstatisticas() {
        try {
            estatisticas = await Memora.chamarApi('/api/statistics');

            document.getElementById('statHoras').textContent = estatisticas.totalHorasEstudadas;
            document.getElementById('statXp').textContent = estatisticas.xpAcumulado;
            document.getElementById('statTaxa').textContent = estatisticas.taxaAcertoGeral + '%';
            document.getElementById('statDiasAtivos').textContent = estatisticas.diasAtivos;
            document.getElementById('statStreakAtual').textContent = estatisticas.sequenciaAtual;
            document.getElementById('statStreakMaior').textContent = estatisticas.maiorSequencia;

            graficoXp = montarGraficoLinha('graficoXp', estatisticas.xpPorSemana, graficoXp);
            graficoAtividade = montarGraficoBarras('graficoAtividade', estatisticas.atividadeSemanal, graficoAtividade);

            renderizarListaTemas('acertosPorMateriaLista', estatisticas.acertosPorMateria);
            renderizarListaTemas('maisEstudadasLista', estatisticas.materiasMaisEstudadas);
            renderizarListaTemas('menosEstudadasLista', estatisticas.materiasMenosEstudadas);
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível carregar as estatísticas agora.', tipo: 'erro' });
        }
    }

    document.querySelectorAll('[data-periodo-xp]').forEach(botao => {
        botao.addEventListener('click', () => {
            document.querySelectorAll('[data-periodo-xp]').forEach(b => b.classList.remove('active'));
            botao.classList.add('active');
            const dados = botao.dataset.periodoXp === 'mensal' ? estatisticas.xpPorMes : estatisticas.xpPorSemana;
            graficoXp = montarGraficoLinha('graficoXp', dados, graficoXp);
        });
    });

    document.querySelectorAll('[data-periodo-atividade]').forEach(botao => {
        botao.addEventListener('click', () => {
            document.querySelectorAll('[data-periodo-atividade]').forEach(b => b.classList.remove('active'));
            botao.classList.add('active');
            const dados = botao.dataset.periodoAtividade === 'mensal' ? estatisticas.atividadeMensal : estatisticas.atividadeSemanal;
            graficoAtividade = montarGraficoBarras('graficoAtividade', dados, graficoAtividade);
        });
    });

    carregarEstatisticas();
</script>

</body>
</html>
