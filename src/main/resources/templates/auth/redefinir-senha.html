<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Redefinir senha · Memora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/memora.css}"/>
    <link rel="stylesheet" th:href="@{/css/leia.css}"/>
</head>
<body>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div class="card-memora" style="max-width: 420px; width: 100%; text-align: center;">
        <div th:replace="~{fragments/leia :: mascote(humor='FELIZ', estagio='ADULTA', tamanho='140px')}" style="margin: 0 auto 12px;"></div>

        <h1>Redefinir senha</h1>
        <p class="texto-suave">Cole o código que você recebeu por e-mail e escolha uma nova senha.</p>

        <div id="erroRedefinir" class="memora-toast memora-toast--erro" style="display: none; margin: 14px 0;"></div>
        <div id="sucessoRedefinir" class="pill-memora pill-memora--mint" style="display: none; margin: 14px 0;">
            Senha redefinida com sucesso! Você já pode entrar.
        </div>

        <form id="formRedefinir" style="text-align: left; margin-top: 18px;">
            <div class="campo-memora">
                <label for="token">Código de recuperação</label>
                <input type="text" id="token" name="token" required placeholder="Cole o código recebido por e-mail"/>
            </div>
            <div class="campo-memora">
                <label for="novaSenha">Nova senha</label>
                <input type="password" id="novaSenha" name="novaSenha" required minlength="6" placeholder="Mínimo 6 caracteres"/>
            </div>
            <button type="submit" class="btn-memora btn-memora--primario" style="width: 100%; justify-content: center;">
                Redefinir senha
            </button>
        </form>

        <p style="margin-top: 18px; font-size: 0.9rem;">
            <a th:href="@{/login}">Voltar para o login</a>
        </p>
    </div>
</div>

<script th:src="@{/js/memora.js}"></script>
<script th:inline="javascript">
    const parametros = new URLSearchParams(window.location.search);
    const tokenDaUrl = parametros.get('token');
    if (tokenDaUrl) {
        document.getElementById('token').value = tokenDaUrl;
    }

    document.getElementById('formRedefinir').addEventListener('submit', async (evento) => {
        evento.preventDefault();
        const erroBox = document.getElementById('erroRedefinir');
        erroBox.style.display = 'none';

        const dados = {
            token: document.getElementById('token').value.trim(),
            novaSenha: document.getElementById('novaSenha').value,
        };

        try {
            await Memora.chamarApi('/api/auth/redefinir-senha', { method: 'POST', body: JSON.stringify(dados) });
            document.getElementById('formRedefinir').style.display = 'none';
            document.getElementById('sucessoRedefinir').style.display = 'block';
            setTimeout(() => window.location.href = '/login', 1800);
        } catch (erro) {
            erroBox.textContent = erro.message;
            erroBox.style.display = 'flex';
        }
    });
</script>

</body>
</html>
