# Perfil usado em produção/Docker — logs mais discretos, sem SQL no
# console, e nenhuma dependência de configuração manual além das
# variáveis de ambiente já definidas no docker-compose.yml.
logging:
  level:
    com.memora: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

spring:
  jpa:
    show-sql: false
