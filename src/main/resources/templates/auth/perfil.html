<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Perfil')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('perfil')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('perfil')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Perfil</h1>
                <p class="texto-suave" style="margin: 0;">Suas informações e preferências.</p>
            </div>
        </div>

        <div class="card-memora" style="max-width: 480px;">
            <div class="campo-memora">
                <label for="perfilNome">Nome</label>
                <input type="text" id="perfilNome"/>
            </div>
            <div class="campo-memora">
                <label for="perfilEmail">E-mail</label>
                <input type="email" id="perfilEmail" disabled style="opacity: 0.7;"/>
            </div>
            <div class="campo-memora">
                <label for="perfilNomePet">Nome da sua gatinha</label>
                <input type="text" id="perfilNomePet"/>
            </div>

            <button class="btn-memora btn-memora--primario" style="width: 100%; margin-top: 8px;" onclick="salvarPerfil()">Salvar alterações</button>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('perfil')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    async function carregarPerfil() {
        try {
            const perfil = await Memora.chamarApi('/api/auth/perfil');
            document.getElementById('perfilNome').value = perfil.nome;
            document.getElementById('perfilEmail').value = perfil.email;
            document.getElementById('perfilNomePet').value = perfil.nomeDaPet || '';
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível carregar seu perfil.', tipo: 'erro' });
        }
    }

    async function salvarPerfil() {
        const dados = {
            nome: document.getElementById('perfilNome').value.trim(),
            nomeDaPet: document.getElementById('perfilNomePet').value.trim(),
        };

        try {
            await Memora.chamarApi('/api/auth/perfil', { method: 'PUT', body: JSON.stringify(dados) });
            Memora.exibirToast({ titulo: 'Perfil atualizado com sucesso!' });
        } catch (erro) {
            Memora.exibirToast({ titulo: erro.message, tipo: 'erro' });
        }
    }

    carregarPerfil();
</script>

</body>
</html>
