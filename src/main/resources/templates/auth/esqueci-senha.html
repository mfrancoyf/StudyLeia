<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recuperar senha · Memora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/memora.css}"/>
    <link rel="stylesheet" th:href="@{/css/leia.css}"/>
</head>
<body>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div class="card-memora" style="max-width: 420px; width: 100%; text-align: center;">
        <div th:replace="~{fragments/leia :: mascote(humor='NEUTRA', estagio='ADULTA', tamanho='140px')}" style="margin: 0 auto 12px;"></div>

        <h1>Esqueceu a senha?</h1>
        <p class="texto-suave">Sem problema! Informe seu e-mail e vamos te enviar um código de recuperação.</p>

        <div id="mensagemEnviado" class="pill-memora pill-memora--mint" style="display: none; margin: 14px 0;">
            Se esse e-mail existir na nossa base, você vai receber as instruções em breve.
        </div>

        <form id="formEsqueciSenha" style="text-align: left; margin-top: 18px;">
            <div class="campo-memora">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="voce@email.com"/>
            </div>
            <button type="submit" class="btn-memora btn-memora--primario" style="width: 100%; justify-content: center;">
                Enviar instruções
            </button>
        </form>

        <p style="margin-top: 18px; font-size: 0.9rem;">
            <a th:href="@{/redefinir-senha}">Já tenho um código de recuperação</a>
        </p>
        <p style="margin-top: 6px; font-size: 0.9rem;">
            <a th:href="@{/login}">Voltar para o login</a>
        </p>
    </div>
</div>

<script th:src="@{/js/memora.js}"></script>
<script th:inline="javascript">
    document.getElementById('formEsqueciSenha').addEventListener('submit', async (evento) => {
        evento.preventDefault();
        const email = document.getElementById('email').value.trim();

        try {
            await Memora.chamarApi('/api/auth/esqueci-senha', { method: 'POST', body: JSON.stringify({ email }) });
        } catch (erro) {
            // Por segurança, mesmo em caso de erro inesperado mostramos a
            // mesma mensagem neutra — não revelamos se o e-mail existe.
        }
        document.getElementById('formEsqueciSenha').style.display = 'none';
        document.getElementById('mensagemEnviado').style.display = 'block';
    });
</script>

</body>
</html>
