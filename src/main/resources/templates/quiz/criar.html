<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Criar Quiz')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('quizzes')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('quizzes')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Criar quiz manualmente</h1>
                <p class="texto-suave" style="margin: 0;">Monte suas próprias perguntas e alternativas.</p>
            </div>
        </div>

        <div class="card-memora" style="max-width: 720px;">
            <div class="campo-memora">
                <label for="titulo">Título do quiz</label>
                <input type="text" id="titulo" placeholder="Ex: Revisão de Anatomia"/>
            </div>
            <div class="grid-memora" style="grid-template-columns: 2fr 1fr; gap: 12px;">
                <div class="campo-memora">
                    <label for="tema">Tema (opcional)</label>
                    <input type="text" id="tema" placeholder="Ex: Sistema Cardiovascular"/>
                </div>
                <div class="campo-memora">
                    <label for="dificuldade">Dificuldade</label>
                    <select id="dificuldade">
                        <option value="FACIL">Fácil</option>
                        <option value="MEDIA" selected>Média</option>
                        <option value="DIFICIL">Difícil</option>
                    </select>
                </div>
            </div>

            <hr style="border-color: var(--memora-line); margin: 20px 0;"/>

            <div id="questoesContainer"></div>

            <button type="button" class="btn-memora btn-memora--secundario" onclick="adicionarQuestao()" style="margin-top: 8px;">
                + Adicionar questão
            </button>

            <div style="margin-top: 24px; display: flex; gap: 10px;">
                <button type="button" class="btn-memora btn-memora--primario" onclick="salvarQuiz()">Salvar quiz</button>
                <a th:href="@{/quizzes}" class="btn-memora btn-memora--fantasma">Cancelar</a>
            </div>

            <div id="erroQuiz" class="memora-toast memora-toast--erro" style="display: none; margin-top: 16px;"></div>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('quizzes')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    let contadorQuestoes = 0;

    function adicionarQuestao() {
        contadorQuestoes++;
        const id = contadorQuestoes;
        const container = document.getElementById('questoesContainer');

        const bloco = document.createElement('div');
        bloco.className = 'card-memora--creme';
        bloco.style = 'border-radius: var(--radius-md); padding: 18px; margin-bottom: 16px;';
        bloco.id = `questao-${id}`;

        bloco.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong>Questão ${id}</strong>
                <button type="button" class="btn-memora btn-memora--fantasma" style="padding: 4px 10px;" onclick="document.getElementById('questao-${id}').remove()">Remover</button>
            </div>
            <div class="campo-memora">
                <textarea class="pergunta-input" rows="2" placeholder="Digite a pergunta..."></textarea>
            </div>
            ${['A', 'B', 'C', 'D'].map(letra => `
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                    <input type="radio" name="correta-${id}" value="${letra}" ${letra === 'A' ? 'checked' : ''} style="width: 18px; height: 18px;"/>
                    <input type="text" class="alternativa-input" data-letra="${letra}" placeholder="Alternativa ${letra}" style="flex: 1; padding: 9px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--memora-line);"/>
                </div>
            `).join('')}
        `;
        container.appendChild(bloco);
    }

    function coletarQuestoes() {
        const blocos = document.querySelectorAll('#questoesContainer > div');
        const questoes = [];

        blocos.forEach(bloco => {
            const pergunta = bloco.querySelector('.pergunta-input').value.trim();
            const corretaLetra = bloco.querySelector('input[type="radio"]:checked')?.value;
            const alternativas = Array.from(bloco.querySelectorAll('.alternativa-input')).map(input => ({
                texto: input.value.trim(),
                letra: input.dataset.letra,
                correta: input.dataset.letra === corretaLetra,
            }));

            if (pergunta && alternativas.every(a => a.texto)) {
                questoes.push({ pergunta, alternativas });
            }
        });

        return questoes;
    }

    async function salvarQuiz() {
        const erroBox = document.getElementById('erroQuiz');
        erroBox.style.display = 'none';

        const questoes = coletarQuestoes();
        const titulo = document.getElementById('titulo').value.trim();

        if (!titulo || questoes.length === 0) {
            erroBox.textContent = 'Informe o título e ao menos uma questão completa.';
            erroBox.style.display = 'flex';
            return;
        }

        const dados = {
            titulo,
            tema: document.getElementById('tema').value.trim() || null,
            dificuldade: document.getElementById('dificuldade').value,
            questoes,
        };

        try {
            const quizCriado = await Memora.chamarApi('/api/quizzes', { method: 'POST', body: JSON.stringify(dados) });
            window.location.href = `/quizzes/${quizCriado.id}/jogar`;
        } catch (erro) {
            erroBox.textContent = erro.message;
            erroBox.style.display = 'flex';
        }
    }

    adicionarQuestao();
</script>

</body>
</html>
