<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Gerar Quiz com IA')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('quizzes')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('quizzes')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Gerar quiz com IA</h1>
                <p class="texto-suave" style="margin: 0;">Informe o tema e a Leia cria as perguntas para você.</p>
            </div>
        </div>

        <div class="card-memora" style="max-width: 480px;" id="formularioContainer">
            <div class="campo-memora">
                <label for="tema">Tema</label>
                <input type="text" id="tema" placeholder="Ex: Anatomia Humana"/>
            </div>
            <div class="grid-memora" style="grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="campo-memora">
                    <label for="quantidade">Quantidade de questões</label>
                    <input type="number" id="quantidade" min="1" max="30" value="10"/>
                </div>
                <div class="campo-memora">
                    <label for="dificuldade">Dificuldade</label>
                    <select id="dificuldade">
                        <option value="FACIL">Fácil</option>
                        <option value="MEDIA" selected>Média</option>
                        <option value="DIFICIL">Difícil</option>
                    </select>
                </div>
            </div>

            <button class="btn-memora btn-memora--dourado" style="width: 100%;" onclick="gerarQuizIA()">✨ Gerar quiz</button>
            <div id="erroGerarQuiz" class="memora-toast memora-toast--erro" style="display: none; margin-top: 14px;"></div>
        </div>

        <div class="card-memora" id="carregandoContainer" style="display: none; max-width: 480px; text-align: center;">
            <div th:replace="~{fragments/leia :: mascote(humor='NEUTRA', estagio='ADULTA', tamanho='140px')}" style="margin: 0 auto 10px;"></div>
            <p class="texto-suave">A Leia está pensando nas perguntas... 🐾</p>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('quizzes')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    async function gerarQuizIA() {
        const erroBox = document.getElementById('erroGerarQuiz');
        erroBox.style.display = 'none';

        const dados = {
            tema: document.getElementById('tema').value.trim(),
            quantidade: parseInt(document.getElementById('quantidade').value, 10),
            dificuldade: document.getElementById('dificuldade').value,
        };

        if (!dados.tema) {
            erroBox.textContent = 'Informe o tema do quiz.';
            erroBox.style.display = 'flex';
            return;
        }

        document.getElementById('formularioContainer').style.display = 'none';
        document.getElementById('carregandoContainer').style.display = 'block';

        try {
            const quiz = await Memora.chamarApi('/api/quizzes/gerar-com-ia', { method: 'POST', body: JSON.stringify(dados) });
            window.location.href = `/quizzes/${quiz.id}/jogar`;
        } catch (erro) {
            document.getElementById('formularioContainer').style.display = 'block';
            document.getElementById('carregandoContainer').style.display = 'none';
            erroBox.textContent = erro.message;
            erroBox.style.display = 'flex';
        }
    }
</script>

</body>
</html>
