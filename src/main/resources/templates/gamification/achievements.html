<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Conquistas')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('achievements')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('achievements')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Conquistas</h1>
                <p class="texto-suave" style="margin: 0;">Cada badge é uma prova do seu esforço.</p>
            </div>
        </div>

        <div id="listaConquistas" class="grid-memora grid-memora--cards">
            <p class="texto-suave">Carregando conquistas...</p>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('achievements')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    const ICONES_CONQUISTA = {
        PRIMEIRA_PROVA: '📝', SEQUENCIA_7_DIAS: '🔥', SEQUENCIA_30_DIAS: '🔥',
        CEM_QUESTOES_RESPONDIDAS: '💯', MIL_XP: '⭐', CINCO_MIL_XP: '🌟',
        PRIMEIRA_ANOTACAO: '✏️', PRIMEIRO_PLANO_CONCLUIDO: '📅',
        DEZ_QUIZZES_CRIADOS: '🧠', NIVEL_10: '🐱', NIVEL_20: '😼', NIVEL_30: '👑',
    };

    async function carregarConquistas() {
        const container = document.getElementById('listaConquistas');
        try {
            const [catalogo, desbloqueadas] = await Promise.all([
                Memora.chamarApi('/api/gamification/achievements/catalogo'),
                Memora.chamarApi('/api/gamification/achievements'),
            ]);

            const tiposDesbloqueados = new Map(desbloqueadas.map(d => [d.tipo, d]));

            container.innerHTML = catalogo.map(item => {
                const desbloqueado = tiposDesbloqueados.get(item.tipo);
                const icone = ICONES_CONQUISTA[item.tipo] || '🏆';
                return `
                    <div class="item-card ${desbloqueado ? '' : 'bloqueado'}" style="padding: 22px 14px;">
                        <span class="item-card__icone">${icone}</span>
                        <strong>${item.titulo}</strong>
                        <p class="texto-suave" style="font-size: 0.8rem;">${item.descricao}</p>
                        ${desbloqueado
                            ? `<span class="pill-memora pill-memora--mint">Desbloqueada</span>`
                            : `<span class="pill-memora">🔒 Bloqueada</span>`}
                    </div>
                `;
            }).join('');
        } catch (erro) {
            container.innerHTML = '<p class="texto-suave">Não foi possível carregar as conquistas agora.</p>';
        }
    }

    carregarConquistas();
</script>

</body>
</html>
