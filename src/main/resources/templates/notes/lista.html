<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Anotações')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('notes')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('notes')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Anotações</h1>
                <p class="texto-suave" style="margin: 0;">Organize tudo o que você está estudando.</p>
            </div>
            <button class="btn-memora btn-memora--primario" onclick="abrirModalNota()">+ Nova anotação</button>
        </div>

        <div id="listaNotas" class="grid-memora grid-memora--cards">
            <p class="texto-suave">Carregando anotações...</p>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('notes')}"></nav>
</div>

<!-- Modal de criação/edição -->
<div class="modal-memora-overlay" id="modalNota">
    <div class="modal-memora" style="max-width: 520px; text-align: left;">
        <h3 id="tituloModalNota">Nova anotação</h3>
        <input type="hidden" id="notaIdEdicao"/>
        <div class="campo-memora">
            <label for="notaTitulo">Título</label>
            <input type="text" id="notaTitulo" placeholder="Ex: Resumo de Bioquímica"/>
        </div>
        <div class="campo-memora">
            <label for="notaConteudo">Conteúdo</label>
            <textarea id="notaConteudo" rows="6" placeholder="Escreva sua anotação aqui..."></textarea>
        </div>
        <div class="campo-memora">
            <label for="notaCategoria">Categoria (opcional)</label>
            <input type="text" id="notaCategoria" placeholder="Ex: Biologia"/>
        </div>
        <div class="campo-memora">
            <label for="notaTags">Tags (separadas por vírgula)</label>
            <input type="text" id="notaTags" placeholder="prova, revisão, importante"/>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-memora btn-memora--fantasma" style="flex: 1;" onclick="fecharModalNota()">Cancelar</button>
            <button class="btn-memora btn-memora--primario" style="flex: 1;" onclick="salvarNota()">Salvar</button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    async function carregarNotas() {
        const container = document.getElementById('listaNotas');
        try {
            const notas = await Memora.chamarApi('/api/notes');
            if (!notas.length) {
                container.innerHTML = '<div class="vazio-estado" style="grid-column:1/-1;"><span class="icone">📝</span>Você ainda não tem nenhuma anotação. Crie a primeira!</div>';
                return;
            }
            container.innerHTML = notas.map(nota => `
                <div class="card-memora">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <h3 style="margin-bottom: 6px;">${nota.titulo}</h3>
                        <div style="display:flex; gap:6px;">
                            <button class="btn-memora btn-memora--fantasma" style="padding:4px 8px; min-height:32px;" onclick='editarNota(${JSON.stringify(nota)})'>✏️</button>
                            <button class="btn-memora btn-memora--fantasma" style="padding:4px 8px; min-height:32px;" onclick="excluirNota('${nota.id}')">🗑️</button>
                        </div>
                    </div>
                    ${nota.categoria ? `<span class="pill-memora" style="margin-bottom: 8px;">${nota.categoria}</span>` : ''}
                    <p class="texto-suave" style="white-space: pre-wrap;">${nota.conteudo.length > 180 ? nota.conteudo.slice(0, 180) + '...' : nota.conteudo}</p>
                    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top: 8px;">
                        ${(nota.tags || []).map(t => `<span class="pill-memora pill-memora--mint" style="font-size:0.7rem;">#${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        } catch (erro) {
            container.innerHTML = '<p class="texto-suave">Não foi possível carregar as anotações agora.</p>';
        }
    }

    function abrirModalNota() {
        document.getElementById('tituloModalNota').textContent = 'Nova anotação';
        document.getElementById('notaIdEdicao').value = '';
        document.getElementById('notaTitulo').value = '';
        document.getElementById('notaConteudo').value = '';
        document.getElementById('notaCategoria').value = '';
        document.getElementById('notaTags').value = '';
        document.getElementById('modalNota').classList.add('visivel');
    }

    function editarNota(nota) {
        document.getElementById('tituloModalNota').textContent = 'Editar anotação';
        document.getElementById('notaIdEdicao').value = nota.id;
        document.getElementById('notaTitulo').value = nota.titulo;
        document.getElementById('notaConteudo').value = nota.conteudo;
        document.getElementById('notaCategoria').value = nota.categoria || '';
        document.getElementById('notaTags').value = (nota.tags || []).join(', ');
        document.getElementById('modalNota').classList.add('visivel');
    }

    function fecharModalNota() {
        document.getElementById('modalNota').classList.remove('visivel');
    }

    async function salvarNota() {
        const id = document.getElementById('notaIdEdicao').value;
        const dados = {
            titulo: document.getElementById('notaTitulo').value.trim(),
            conteudo: document.getElementById('notaConteudo').value.trim(),
            categoria: document.getElementById('notaCategoria').value.trim() || null,
            tags: document.getElementById('notaTags').value.split(',').map(t => t.trim()).filter(Boolean),
        };

        if (!dados.titulo || !dados.conteudo) {
            Memora.exibirToast({ titulo: 'Preencha o título e o conteúdo.', tipo: 'erro' });
            return;
        }

        try {
            if (id) {
                await Memora.chamarApi(`/api/notes/${id}`, { method: 'PUT', body: JSON.stringify(dados) });
                Memora.exibirToast({ titulo: 'Anotação atualizada!' });
            } else {
                const resultado = await Memora.chamarApi('/api/notes', { method: 'POST', body: JSON.stringify(dados) });
                Memora.exibirToast({ titulo: '📝 +5 XP por criar uma anotação!' });
            }
            fecharModalNota();
            carregarNotas();
        } catch (erro) {
            Memora.exibirToast({ titulo: erro.message, tipo: 'erro' });
        }
    }

    async function excluirNota(id) {
        if (!confirm('Excluir esta anotação?')) return;
        try {
            await Memora.chamarApi(`/api/notes/${id}`, { method: 'DELETE' });
            carregarNotas();
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível excluir.', tipo: 'erro' });
        }
    }

    carregarNotas();
</script>

</body>
</html>
