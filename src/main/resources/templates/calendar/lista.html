<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Calendário')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('calendar')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('calendar')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 style="margin-bottom: 2px;">Calendário</h1>
                <p class="texto-suave" style="margin: 0;">Provas, trabalhos, apresentações e lembretes.</p>
            </div>
            <button class="btn-memora btn-memora--primario" onclick="abrirModalEvento()">+ Novo evento</button>
        </div>

        <div id="alertasContainer"></div>

        <div id="listaEventos" style="display: flex; flex-direction: column; gap: 10px;">
            <p class="texto-suave">Carregando eventos...</p>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('calendar')}"></nav>
</div>

<div class="modal-memora-overlay" id="modalEvento">
    <div class="modal-memora" style="max-width: 460px; text-align: left;">
        <h3 id="tituloModalEvento">Novo evento</h3>
        <input type="hidden" id="eventoIdEdicao"/>
        <div class="campo-memora">
            <label for="eventoTitulo">Título</label>
            <input type="text" id="eventoTitulo" placeholder="Ex: Prova de Cálculo II"/>
        </div>
        <div class="campo-memora">
            <label for="eventoTipo">Tipo</label>
            <select id="eventoTipo">
                <option value="PROVA">Prova</option>
                <option value="TRABALHO">Trabalho</option>
                <option value="APRESENTACAO">Apresentação</option>
                <option value="LEMBRETE">Lembrete</option>
            </select>
        </div>
        <div class="campo-memora">
            <label for="eventoDataHora">Data e hora</label>
            <input type="datetime-local" id="eventoDataHora"/>
        </div>
        <div class="campo-memora">
            <label for="eventoDescricao">Descrição (opcional)</label>
            <textarea id="eventoDescricao" rows="3"></textarea>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-memora btn-memora--fantasma" style="flex:1;" onclick="fecharModalEvento()">Cancelar</button>
            <button class="btn-memora btn-memora--primario" style="flex:1;" onclick="salvarEvento()">Salvar</button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    const ICONES_EVENTO = { PROVA: '📝', TRABALHO: '💼', APRESENTACAO: '🎤', LEMBRETE: '🔔' };

    async function carregarEventos() {
        const container = document.getElementById('listaEventos');
        try {
            const eventos = await Memora.chamarApi('/api/calendar/events');
            if (!eventos.length) {
                container.innerHTML = '<div class="vazio-estado"><span class="icone">🗓️</span>Nenhum evento cadastrado ainda.</div>';
                return;
            }
            container.innerHTML = eventos.map(evento => `
                <div class="card-memora" style="display:flex; align-items:center; gap: 14px;">
                    <span style="font-size: 1.8rem;">${ICONES_EVENTO[evento.tipo] || '📌'}</span>
                    <div style="flex:1;">
                        <strong>${evento.titulo}</strong>
                        <div class="texto-suave" style="font-size: 0.85rem;">${new Date(evento.dataHora).toLocaleString('pt-BR', { dateStyle: 'long', timeStyle: 'short' })}</div>
                        ${evento.descricao ? `<p class="texto-suave" style="font-size: 0.85rem; margin-top: 4px;">${evento.descricao}</p>` : ''}
                    </div>
                    <span class="pill-memora ${evento.diasRestantes <= 2 ? 'pill-memora--coral' : 'pill-memora--dourado'}">
                        ${evento.diasRestantes < 0 ? 'Passou' : evento.diasRestantes === 0 ? 'Hoje' : evento.diasRestantes + 'd'}
                    </span>
                    <button class="btn-memora btn-memora--fantasma" style="min-height:36px; padding:4px 10px;" onclick='editarEvento(${JSON.stringify(evento)})' aria-label="Editar evento">✏️</button>
                    <button class="btn-memora btn-memora--fantasma" style="min-height:36px; padding:4px 10px;" onclick="excluirEvento('${evento.id}')" aria-label="Excluir evento">🗑️</button>
                </div>
            `).join('');
        } catch (erro) {
            container.innerHTML = '<p class="texto-suave">Não foi possível carregar os eventos agora.</p>';
        }
    }

    function abrirModalEvento() {
        document.getElementById('tituloModalEvento').textContent = 'Novo evento';
        document.getElementById('eventoIdEdicao').value = '';
        document.getElementById('eventoTitulo').value = '';
        document.getElementById('eventoTipo').value = 'PROVA';
        document.getElementById('eventoDataHora').value = '';
        document.getElementById('eventoDescricao').value = '';
        document.getElementById('modalEvento').classList.add('visivel');
    }

    function editarEvento(evento) {
        document.getElementById('tituloModalEvento').textContent = 'Editar evento';
        document.getElementById('eventoIdEdicao').value = evento.id;
        document.getElementById('eventoTitulo').value = evento.titulo;
        document.getElementById('eventoTipo').value = evento.tipo;
        // datetime-local exige formato "AAAA-MM-DDTHH:mm" sem timezone/segundos.
        document.getElementById('eventoDataHora').value = evento.dataHora.slice(0, 16);
        document.getElementById('eventoDescricao').value = evento.descricao || '';
        document.getElementById('modalEvento').classList.add('visivel');
    }

    function fecharModalEvento() {
        document.getElementById('modalEvento').classList.remove('visivel');
    }

    async function salvarEvento() {
        const id = document.getElementById('eventoIdEdicao').value;
        const dados = {
            titulo: document.getElementById('eventoTitulo').value.trim(),
            tipo: document.getElementById('eventoTipo').value,
            dataHora: document.getElementById('eventoDataHora').value,
            descricao: document.getElementById('eventoDescricao').value.trim() || null,
        };

        if (!dados.titulo || !dados.dataHora) {
            Memora.exibirToast({ titulo: 'Preencha o título e a data.', tipo: 'erro' });
            return;
        }

        try {
            if (id) {
                await Memora.chamarApi(`/api/calendar/events/${id}`, { method: 'PUT', body: JSON.stringify(dados) });
                Memora.exibirToast({ titulo: '✅ Evento atualizado!' });
            } else {
                await Memora.chamarApi('/api/calendar/events', { method: 'POST', body: JSON.stringify(dados) });
                Memora.exibirToast({ titulo: '🗓️ Evento criado! +3 XP' });
            }
            fecharModalEvento();
            carregarEventos();
            carregarAlertas();
        } catch (erro) {
            Memora.exibirToast({ titulo: erro.message, tipo: 'erro' });
        }
    }

    async function excluirEvento(id) {
        if (!confirm('Excluir este evento?')) return;
        try {
            await Memora.chamarApi(`/api/calendar/events/${id}`, { method: 'DELETE' });
            carregarEventos();
            carregarAlertas();
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível excluir.', tipo: 'erro' });
        }
    }

    async function carregarAlertas() {
        const container = document.getElementById('alertasContainer');
        try {
            const alertas = await Memora.chamarApi('/api/calendar/alertas');
            if (!alertas.length) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = `
                <div class="card-memora card-memora--azul" style="margin-bottom: 18px;">
                    <strong>⏰ Atenção: você tem ${alertas.length} evento(s) chegando nos próximos 7 dias!</strong>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px;">
                        ${alertas.map(a => `<span class="pill-memora" style="background: rgba(255,255,255,0.2); color: white;">${a.titulo} · ${a.diasRestantes === 0 ? 'hoje' : a.diasRestantes + 'd'}</span>`).join('')}
                    </div>
                </div>
            `;
        } catch (erro) {
            container.innerHTML = '';
        }
    }

    carregarEventos();
    carregarAlertas();
</script>

</body>
</html>
