<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Jogar Quiz')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('quizzes')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('quizzes')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 id="quizTituloTexto" style="margin-bottom: 2px;">Quiz</h1>
                <p class="texto-suave" id="progressoQuestaoTexto" style="margin: 0;"></p>
            </div>
            <a th:href="@{/quizzes}" class="btn-memora btn-memora--fantasma">← Sair</a>
        </div>

        <div class="xp-barra" style="margin-bottom: 20px;">
            <div class="xp-barra__preenchimento" id="barraProgressoQuiz" style="width: 0%;"></div>
        </div>

        <!-- Tela de jogo -->
        <div id="telaJogo" style="max-width: 560px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 16px;">
                <div id="leiaBalaoQuiz" class="leia-balao" style="display: none; max-width: 320px; margin: 0 auto 10px;"></div>
                <div th:replace="~{fragments/leia :: mascote(humor='NEUTRA', estagio='ADULTA', tamanho='130px')}" style="margin: 0 auto;"></div>
            </div>

            <div class="card-memora">
                <h3 id="perguntaTexto" style="margin-bottom: 16px;">Carregando questão...</h3>
                <div id="alternativasContainer" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>

            <button class="btn-memora btn-memora--primario" id="botaoProxima" style="width: 100%; margin-top: 16px; display: none;" onclick="proximaQuestao()">
                Próxima questão →
            </button>
        </div>

        <!-- Tela final -->
        <div id="telaFinal" style="display: none; max-width: 480px; margin: 0 auto; text-align: center;">
            <div th:replace="~{fragments/leia :: mascote(humor='SUPER_FELIZ', estagio='ADULTA', tamanho='180px')}" style="margin: 0 auto 14px;"></div>
            <h2>Quiz concluído! 🎉</h2>
            <p class="texto-suave" id="resultadoFinalTexto"></p>
            <div style="display: flex; gap: 10px; margin-top: 18px;">
                <a th:href="@{/quizzes}" class="btn-memora btn-memora--secundario" style="flex: 1;">Ver quizzes</a>
                <a th:href="@{/dashboard}" class="btn-memora btn-memora--primario" style="flex: 1;">Ir ao início</a>
            </div>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('quizzes')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    const quizId = window.location.pathname.split('/')[2];

    let quizAtual = null;
    let indiceQuestaoAtual = 0;
    let totalCorretas = 0;
    let respondendoNoMomento = false;

    function aplicarHumorQuiz(humor) {
        const widget = document.getElementById('leiaWidget');
        if (!widget) return;
        widget.className = widget.className.split(' ').filter(c => !c.startsWith('leia--')).join(' ');
        widget.classList.add('leia--' + humor.toLowerCase().replace(/_/g, '-'));
        widget.classList.add('leia--adulta');
    }

    function renderizarQuestaoAtual() {
        const questao = quizAtual.questoes[indiceQuestaoAtual];
        respondendoNoMomento = false;

        document.getElementById('progressoQuestaoTexto').textContent = `Questão ${indiceQuestaoAtual + 1} de ${quizAtual.questoes.length}`;
        document.getElementById('barraProgressoQuiz').style.width = `${(indiceQuestaoAtual / quizAtual.questoes.length) * 100}%`;
        document.getElementById('perguntaTexto').textContent = questao.pergunta;
        document.getElementById('botaoProxima').style.display = 'none';
        document.getElementById('leiaBalaoQuiz').style.display = 'none';
        aplicarHumorQuiz('NEUTRA');

        const container = document.getElementById('alternativasContainer');
        container.innerHTML = questao.alternativas.map(alt => `
            <button class="btn-memora btn-memora--secundario alternativa-btn" style="justify-content: flex-start; text-align: left; width: 100%;" data-id="${alt.id}" onclick="responder('${alt.id}')">
                <strong style="margin-right: 6px;">${alt.letra})</strong> ${alt.texto}
            </button>
        `).join('');
    }

    async function responder(alternativaId) {
        if (respondendoNoMomento) return;
        respondendoNoMomento = true;

        const questao = quizAtual.questoes[indiceQuestaoAtual];

        try {
            const resultado = await Memora.chamarApi(
                `/api/quizzes/${quizId}/questoes/${questao.id}/responder`,
                { method: 'POST', body: JSON.stringify({ alternativaId }) }
            );

            document.querySelectorAll('.alternativa-btn').forEach(botao => {
                botao.disabled = true;
                if (botao.dataset.id === resultado.alternativaCorretaId) {
                    botao.classList.remove('btn-memora--secundario');
                    botao.classList.add('btn-memora--primario');
                } else if (botao.dataset.id === alternativaId) {
                    botao.classList.remove('btn-memora--secundario');
                    botao.classList.add('btn-memora--perigo');
                }
            });

            aplicarHumorQuiz(resultado.correta ? 'SUPER_FELIZ' : 'TRISTE');
            const balao = document.getElementById('leiaBalaoQuiz');
            balao.textContent = resultado.mensagemIncentivo;
            balao.style.display = 'block';

            if (resultado.correta) totalCorretas++;

            Memora.processarRecompensa(resultado.recompensa);

            document.getElementById('botaoProxima').style.display = 'block';
            document.getElementById('botaoProxima').textContent =
                indiceQuestaoAtual + 1 < quizAtual.questoes.length ? 'Próxima questão →' : 'Ver resultado final →';

        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível registrar sua resposta.', tipo: 'erro' });
            respondendoNoMomento = false;
        }
    }

    async function proximaQuestao() {
        indiceQuestaoAtual++;
        if (indiceQuestaoAtual < quizAtual.questoes.length) {
            renderizarQuestaoAtual();
        } else {
            await finalizarQuiz();
        }
    }

    async function finalizarQuiz() {
        document.getElementById('barraProgressoQuiz').style.width = '100%';
        try {
            await Memora.chamarApi(`/api/quizzes/${quizId}/concluir`, { method: 'POST' });
        } catch (erro) {
            // Mesmo se o bônus de conclusão falhar, mostramos o resultado.
        }

        document.getElementById('telaJogo').style.display = 'none';
        document.getElementById('telaFinal').style.display = 'block';
        document.getElementById('resultadoFinalTexto').textContent =
            `Você acertou ${totalCorretas} de ${quizAtual.questoes.length} questões. A Leia está muito orgulhosa de você!`;

        Memora.dispararConfete();
    }

    async function carregarQuiz() {
        try {
            quizAtual = await Memora.chamarApi(`/api/quizzes/${quizId}`);
            document.getElementById('quizTituloTexto').textContent = quizAtual.titulo;
            renderizarQuestaoAtual();
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível carregar este quiz.', tipo: 'erro' });
        }
    }

    carregarQuiz();
</script>

</body>
</html>
