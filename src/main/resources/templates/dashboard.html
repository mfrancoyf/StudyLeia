<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Início')}"></head>
<body>

<div class="app-shell">
    <nav th:replace="~{fragments/layout :: sidebar('dashboard')}"></nav>
    <nav th:replace="~{fragments/layout :: drawer('dashboard')}"></nav>
    <div th:replace="~{fragments/layout :: sidebar-overlay}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: topbar-mobile}"></div>

        <div class="app-topbar">
            <div>
                <h1 id="saudacaoTexto" style="margin-bottom: 2px;">Olá!</h1>
                <p class="texto-suave" style="margin: 0;">Vamos continuar de onde você parou.</p>
            </div>
        </div>

        <div class="grid-memora dashboard-grid">
            <!-- Coluna da Leia -->
            <div class="dashboard-grid__leia">
                <div class="card-memora" style="text-align: center; padding: 32px 20px;">
                    <div id="leiaBalao" class="leia-balao" style="display: none;"></div>
                    <div th:replace="~{fragments/leia :: mascote(humor='FELIZ', estagio='ADULTA', tamanho='170px')}" style="margin: 0 auto;"></div>
                    <h3 id="nomePetTexto" style="margin-top: 14px;">Leia</h3>
                    <p class="texto-suave" id="estagioTexto" style="margin: 0;">Fase adulta</p>
                </div>

                <div class="card-memora" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
                        <span class="texto-suave" style="font-weight: 700; font-size: 0.85rem;">NÍVEL <span id="nivelAtualTexto">1</span></span>
                        <span class="texto-suave" style="font-size: 0.8rem;" id="xpFaltanteTexto">0 XP para o próximo nível</span>
                    </div>
                    <div class="xp-barra">
                        <div class="xp-barra__preenchimento" id="xpBarraPreenchimento" style="width: 0%;"></div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap;">
                        <span class="pill-memora pill-memora--dourado">🪙 <span id="moedasTexto">0</span> moedas</span>
                        <span class="pill-memora pill-memora--coral">🔥 <span id="streakTexto">0</span> dias</span>
                    </div>
                </div>
            </div>

            <!-- Coluna principal -->
            <div class="dashboard-grid__principal">

                <div class="card-memora" style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 14px;">🎯 Missões de hoje</h3>
                    <div id="missoesContainer" style="display: flex; flex-direction: column; gap: 12px;">
                        <p class="texto-suave">Carregando missões...</p>
                    </div>
                </div>

                <div class="card-memora">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
                        <h3 style="margin: 0;">📅 Próximas provas e eventos</h3>
                        <a th:href="@{/calendar}" class="texto-azul" style="font-size: 0.88rem; font-weight: 700;">Ver calendário</a>
                    </div>
                    <div id="eventosContainer">
                        <p class="texto-suave">Carregando eventos...</p>
                    </div>
                </div>

                <div class="grid-memora grid-memora--2" style="margin-top: 20px;">
                    <a th:href="@{/quizzes}" class="btn-memora btn-memora--secundario" style="flex-direction: column; padding: 18px 8px;">
                        <span style="font-size: 1.6rem;">🧠</span> Quizzes
                    </a>
                    <a th:href="@{/study-plans}" class="btn-memora btn-memora--secundario" style="flex-direction: column; padding: 18px 8px;">
                        <span style="font-size: 1.6rem;">📅</span> Planos
                    </a>
                    <a th:href="@{/notes}" class="btn-memora btn-memora--secundario" style="flex-direction: column; padding: 18px 8px;">
                        <span style="font-size: 1.6rem;">📝</span> Anotações
                    </a>
                    <a th:href="@{/focus}" class="btn-memora btn-memora--secundario" style="flex-direction: column; padding: 18px 8px;">
                        <span style="font-size: 1.6rem;">⏱️</span> Modo Foco
                    </a>
                </div>
            </div>
        </div>
    </main>
    <nav th:replace="~{fragments/layout :: bottom-nav('dashboard')}"></nav>
</div>

<div th:replace="~{fragments/layout :: scripts-finais}"></div>

<script th:inline="javascript">
    const FRASES_POR_HUMOR = {
        TRISTE: 'Estou com saudade de estudar com você... 🥺',
        ENTEDIADA: 'Bocejando de tédio aqui... vamos estudar?',
        NEUTRA: 'Pronta para começar quando você quiser!',
        FELIZ: 'Que bom te ver! Vamos estudar juntas? 💙',
        SUPER_FELIZ: 'Estou tão feliz com seu progresso! Você é demais! ✨',
    };

    const NOMES_ESTAGIO = {
        FILHOTE: 'Fase filhote',
        JOVEM: 'Fase jovem',
        ADULTA: 'Fase adulta',
        SABIA: 'Fase sábia',
        RAINHA_LEIA: 'Rainha Leia 👑',
    };

    function aplicarHumorEEstagio(humor, estagio) {
        const widget = document.getElementById('leiaWidget');
        if (!widget) return;

        widget.className = widget.className
            .split(' ')
            .filter(classe => !classe.startsWith('leia--'))
            .join(' ');

        widget.classList.add('leia--' + humor.toLowerCase().replace(/_/g, '-'));
        widget.classList.add('leia--' + estagio.toLowerCase().replace(/_/g, '-'));

        const balao = document.getElementById('leiaBalao');
        balao.textContent = FRASES_POR_HUMOR[humor] || '';
        balao.style.display = 'block';

        document.getElementById('estagioTexto').textContent = NOMES_ESTAGIO[estagio] || estagio;
    }

    function renderizarMissoes(missoes) {
        const container = document.getElementById('missoesContainer');
        if (!missoes.length) {
            container.innerHTML = '<p class="texto-suave">Nenhuma missão hoje. Volte mais tarde!</p>';
            return;
        }

        container.innerHTML = missoes.map(missao => `
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 1.3rem;">${missao.concluida ? '✅' : '⬜'}</span>
                <div style="flex: 1;">
                    <div style="font-weight: 700; font-size: 0.92rem;">${missao.titulo}</div>
                    <div class="xp-barra" style="height: 8px; margin-top: 4px;">
                        <div class="xp-barra__preenchimento" style="width: ${Math.min(100, (missao.progresso / missao.meta) * 100)}%;"></div>
                    </div>
                </div>
                <span class="texto-suave" style="font-size: 0.82rem; white-space: nowrap;">${missao.progresso}/${missao.meta}</span>
            </div>
        `).join('');
    }

    function renderizarEventos(eventos) {
        const container = document.getElementById('eventosContainer');
        if (!eventos.length) {
            container.innerHTML = '<div class="vazio-estado"><span class="icone">📭</span>Nenhuma prova ou evento nos próximos dias.</div>';
            return;
        }

        const icones = { PROVA: '📝', TRABALHO: '💼', APRESENTACAO: '🎤', LEMBRETE: '🔔' };

        container.innerHTML = eventos.map(evento => `
            <div style="display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--memora-line);">
                <span style="font-size: 1.4rem;">${icones[evento.tipo] || '📌'}</span>
                <div style="flex: 1;">
                    <div style="font-weight: 700; font-size: 0.92rem;">${evento.titulo}</div>
                    <div class="texto-suave" style="font-size: 0.82rem;">${new Date(evento.dataHora).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' })}</div>
                </div>
                <span class="pill-memora ${evento.diasRestantes <= 2 ? 'pill-memora--coral' : 'pill-memora--dourado'}">
                    ${evento.diasRestantes === 0 ? 'Hoje' : evento.diasRestantes + 'd'}
                </span>
            </div>
        `).join('');
    }

    async function carregarDashboard() {
        try {
            const dados = await Memora.chamarApi('/api/dashboard');

            document.getElementById('saudacaoTexto').textContent = dados.saudacao;
            document.getElementById('nomePetTexto').textContent = dados.pet.nomePet;
            aplicarHumorEEstagio(dados.pet.humor, dados.pet.estagioEvolucao);

            const progresso = dados.progresso;
            document.getElementById('nivelAtualTexto').textContent = progresso.nivelAtual;
            document.getElementById('xpFaltanteTexto').textContent = `${progresso.xpFaltanteProximoNivel} XP para o próximo nível`;
            document.getElementById('xpBarraPreenchimento').style.width = progresso.progressoPercentual + '%';
            document.getElementById('moedasTexto').textContent = progresso.moedas;
            document.getElementById('streakTexto').textContent = progresso.sequenciaAtual;

            renderizarMissoes(dados.missoesDoDia);
            renderizarEventos(dados.proximosEventos);
        } catch (erro) {
            Memora.exibirToast({ titulo: 'Não foi possível carregar o dashboard agora.', tipo: 'erro' });
        }
    }

    carregarDashboard();
</script>

</body>
</html>
